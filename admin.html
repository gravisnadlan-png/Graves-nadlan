<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>גראביס | כניסת סוכנים</title>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@300;400;700;900&family=Heebo:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script>
// Load Firebase dynamically with fallback
function loadScript(src, cb) {
  var s = document.createElement('script');
  s.src = src;
  s.onload = cb;
  s.onerror = function() { console.error('Failed to load: ' + src); cb(); };
  document.head.appendChild(s);
}
loadScript('https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js', function() {
  loadScript('https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js', function() {
    if(typeof firebase !== 'undefined') {
      initFirebase();
    } else {
      document.getElementById('loginError').textContent = 'שגיאה בטעינת Firebase. בדוק חיבור לאינטרנט.';
      document.getElementById('loginError').classList.add('show');
    }
  });
});
</script>
<style>
:root{--gold:#c9a84c;--gold-light:#e8d5a3;--dark:#080b12;--dark-2:#0e1118;--dark-3:#161b26;--dark-4:#1e2535;--dark-5:#2a3347;--text:#edeae2;--text-muted:#6b7280;--text-soft:#9ca3af;--white:#ffffff;--radius:12px;--radius-sm:8px;--shadow:0 4px 24px rgba(0,0,0,0.4);--shadow-lg:0 16px 64px rgba(0,0,0,0.6)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--dark);color:var(--text);font-family:'Heebo',sans-serif;min-height:100vh;overflow-x:hidden}

/* LOGIN */
#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden}
#loginScreen::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 30% 40%,rgba(201,168,76,0.07) 0%,transparent 70%),radial-gradient(ellipse 60% 80% at 80% 70%,rgba(201,168,76,0.04) 0%,transparent 60%);animation:bgPulse 8s ease-in-out infinite alternate}
@keyframes bgPulse{from{opacity:0.6;transform:scale(1)}to{opacity:1;transform:scale(1.05)}}
#loginScreen::after{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(201,168,76,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(201,168,76,0.04) 1px,transparent 1px);background-size:48px 48px;pointer-events:none}
.login-card{position:relative;z-index:1;background:rgba(14,17,24,0.85);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(201,168,76,0.18);border-radius:20px;padding:44px 40px 40px;width:100%;max-width:420px;box-shadow:var(--shadow-lg),0 0 0 1px rgba(201,168,76,0.06);animation:cardIn 0.7s cubic-bezier(0.4,0,0.2,1) both}
@keyframes cardIn{from{opacity:0;transform:translateY(24px) scale(0.97)}to{opacity:1;transform:none}}
.login-logo-wrap{display:flex;flex-direction:column;align-items:center;margin-bottom:32px}
.login-logo-icon{width:64px;height:64px;background:linear-gradient(135deg,rgba(201,168,76,0.2),rgba(201,168,76,0.05));border:1px solid rgba(201,168,76,0.3);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:1.8rem;margin-bottom:14px;box-shadow:0 8px 32px rgba(201,168,76,0.15)}
.login-company{font-family:'Frank Ruhl Libre',serif;font-size:1.2rem;font-weight:700;color:var(--gold);letter-spacing:1.5px;margin-bottom:4px}
.login-subtitle{font-size:0.72rem;color:var(--text-muted);letter-spacing:3px;text-transform:uppercase}
.login-divider{height:1px;background:linear-gradient(to left,transparent,rgba(201,168,76,0.2),transparent);margin-bottom:28px}
.login-title{font-family:'Frank Ruhl Libre',serif;font-size:1.4rem;color:var(--white);margin-bottom:6px;text-align:center}
.login-desc{font-size:0.82rem;color:var(--text-muted);text-align:center;margin-bottom:28px;line-height:1.6}
.form-field{display:flex;flex-direction:column;gap:7px;margin-bottom:16px}
.form-field label{font-size:0.72rem;color:var(--text-muted);letter-spacing:0.5px}
.form-field input{background:var(--dark-3);border:1px solid var(--dark-5);border-radius:var(--radius-sm);color:var(--text);font-family:'Heebo',sans-serif;font-size:0.95rem;padding:13px 16px;outline:none;direction:ltr;transition:border-color 0.2s,box-shadow 0.2s;width:100%}
.form-field input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,0.12)}
.form-field input::placeholder{color:var(--text-muted)}
.login-btn{width:100%;background:var(--gold);color:var(--dark);border:none;border-radius:var(--radius-sm);font-family:'Frank Ruhl Libre',serif;font-weight:700;font-size:1rem;padding:14px;cursor:pointer;transition:background 0.2s,transform 0.15s;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:8px}
.login-btn:hover:not(:disabled){background:var(--gold-light);transform:translateY(-1px)}
.login-btn:disabled{opacity:0.6;cursor:not-allowed;transform:none}
.login-error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:var(--radius-sm);color:#fca5a5;font-size:0.82rem;padding:10px 14px;margin-top:14px;text-align:center;display:none}
.login-error.show{display:block;animation:shake 0.3s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.login-footer{margin-top:24px;text-align:center;font-size:0.72rem;color:var(--text-muted)}
.spinner{width:18px;height:18px;border:2px solid rgba(10,12,16,0.3);border-top-color:var(--dark);border-radius:50%;animation:spin 0.7s linear infinite;display:none}
.login-btn.loading .spinner{display:block}
.login-btn.loading .btn-text{display:none}
@keyframes spin{to{transform:rotate(360deg)}}

/* ADMIN */
#adminScreen{display:none}
.admin-nav{position:fixed;top:0;right:0;left:0;z-index:1000;height:64px;background:rgba(8,11,18,0.97);backdrop-filter:blur(20px);border-bottom:1px solid rgba(201,168,76,0.15);display:flex;align-items:center;padding:0 24px;gap:16px}
.admin-nav-logo{font-family:'Frank Ruhl Libre',serif;font-size:1rem;color:var(--gold);font-weight:700;letter-spacing:1px;flex:1}
.admin-badge{background:rgba(201,168,76,0.12);border:1px solid rgba(201,168,76,0.3);border-radius:6px;padding:4px 12px;font-size:0.72rem;color:var(--gold);letter-spacing:1px;text-transform:uppercase}
.admin-user{font-size:0.78rem;color:var(--text-muted);display:flex;align-items:center;gap:8px}
.admin-user-dot{width:8px;height:8px;background:#22c55e;border-radius:50%;box-shadow:0 0 6px rgba(34,197,94,0.5)}
.logout-btn{background:var(--dark-3);border:1px solid var(--dark-5);border-radius:8px;color:var(--text-muted);font-family:'Heebo',sans-serif;font-size:0.78rem;padding:7px 14px;cursor:pointer;transition:all 0.2s}
.logout-btn:hover{border-color:#ef4444;color:#ef4444}
.admin-body{margin-top:64px;display:grid;grid-template-columns:300px 1fr;height:calc(100vh - 64px)}
.admin-sidebar{background:var(--dark-2);border-left:1px solid var(--dark-4);display:flex;flex-direction:column;overflow:hidden}
.sidebar-header{padding:16px 16px 12px;border-bottom:1px solid var(--dark-4)}
.sidebar-title{font-family:'Frank Ruhl Libre',serif;font-size:0.95rem;color:var(--white);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.prop-count{font-size:0.72rem;background:var(--dark-4);color:var(--text-muted);padding:3px 10px;border-radius:99px}
.filter-row{display:flex;gap:5px;flex-wrap:wrap}
.fpill{padding:4px 10px;background:var(--dark-3);border:1px solid var(--dark-5);border-radius:99px;color:var(--text-muted);font-size:0.7rem;cursor:pointer;transition:all 0.2s}
.fpill.active{background:rgba(201,168,76,0.1);border-color:var(--gold);color:var(--gold)}
.sidebar-search{padding:10px 14px;border-bottom:1px solid var(--dark-4)}
.sidebar-search input{width:100%;background:var(--dark-3);border:1px solid var(--dark-5);border-radius:8px;color:var(--text);font-family:'Heebo',sans-serif;font-size:0.82rem;padding:8px 12px;outline:none;direction:rtl;transition:border-color 0.2s}
.sidebar-search input:focus{border-color:var(--gold)}
.sidebar-search input::placeholder{color:var(--text-muted)}
.props-list{flex:1;overflow-y:auto;padding:6px}
.props-list::-webkit-scrollbar{width:3px}
.props-list::-webkit-scrollbar-thumb{background:var(--dark-5);border-radius:2px}
.prop-item{display:flex;gap:10px;padding:10px;border-radius:10px;cursor:pointer;transition:background 0.15s;border:1px solid transparent;margin-bottom:3px}
.prop-item:hover{background:var(--dark-3)}
.prop-item.active{background:rgba(201,168,76,0.08);border-color:rgba(201,168,76,0.25)}
.prop-item-img{width:58px;height:52px;border-radius:7px;object-fit:cover;flex-shrink:0;filter:brightness(0.85)}
.prop-item-info{flex:1;min-width:0}
.prop-item-title{font-size:0.8rem;color:var(--white);font-weight:500;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prop-item-city{font-size:0.68rem;color:var(--text-muted);margin-bottom:4px}
.prop-item-price{font-family:'Frank Ruhl Libre',serif;font-size:0.85rem;color:var(--gold);font-weight:700}
.prop-type-badge{font-size:0.6rem;padding:2px 6px;border-radius:4px;letter-spacing:0.5px;white-space:nowrap}
.badge-sale{background:rgba(34,197,94,0.1);color:#86efac;border:1px solid rgba(34,197,94,0.2)}
.badge-rent{background:rgba(96,165,250,0.1);color:#93c5fd;border:1px solid rgba(96,165,250,0.2)}
.badge-penthouse{background:rgba(201,168,76,0.1);color:var(--gold);border:1px solid rgba(201,168,76,0.2)}
.badge-new{background:rgba(167,139,250,0.1);color:#c4b5fd;border:1px solid rgba(167,139,250,0.2)}
.admin-map-wrap{position:relative;overflow:hidden}
#adminMapCanvas{width:100%;height:100%;display:block;cursor:grab}
#adminMapCanvas:active{cursor:grabbing}
.map-controls{position:absolute;bottom:24px;left:16px;display:flex;flex-direction:column;gap:4px;z-index:10}
.map-ctrl-btn{width:36px;height:36px;background:rgba(14,17,24,0.92);backdrop-filter:blur(8px);border:1px solid rgba(201,168,76,0.2);border-radius:8px;color:var(--text);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
.map-ctrl-btn:hover{border-color:var(--gold);color:var(--gold)}
.map-poi-bar{position:absolute;top:14px;right:14px;display:flex;gap:5px;flex-wrap:wrap;z-index:10;max-width:68%}
.poi-chip{padding:5px 10px;background:rgba(14,17,24,0.92);backdrop-filter:blur(8px);border:1px solid var(--dark-5);border-radius:7px;color:var(--text-muted);font-size:0.72rem;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:4px;font-family:'Heebo',sans-serif}
.poi-chip:hover{border-color:var(--gold);color:var(--text)}
.poi-chip.active{background:rgba(201,168,76,0.1);border-color:var(--gold);color:var(--gold)}
.poi-chip-dot{width:6px;height:6px;border-radius:50%;background:#ef4444;flex-shrink:0}
.map-prop-popup{position:absolute;bottom:20px;right:20px;width:270px;background:rgba(14,17,24,0.96);backdrop-filter:blur(16px);border:1px solid rgba(201,168,76,0.3);border-radius:var(--radius);overflow:hidden;display:none;z-index:10;box-shadow:var(--shadow-lg);animation:popupIn 0.3s cubic-bezier(0.4,0,0.2,1)}
@keyframes popupIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.popup-img{width:100%;height:130px;object-fit:cover;display:block;filter:brightness(0.82)}
.popup-body{padding:12px 14px 14px}
.popup-type{font-size:0.65rem;letter-spacing:1px;text-transform:uppercase;color:var(--gold);margin-bottom:4px}
.popup-title{font-family:'Frank Ruhl Libre',serif;font-size:0.95rem;color:var(--white);margin-bottom:2px}
.popup-loc{font-size:0.72rem;color:var(--text-muted);margin-bottom:6px}
.popup-price{font-family:'Frank Ruhl Libre',serif;font-size:1.1rem;color:var(--gold);font-weight:700;margin-bottom:8px}
.popup-meta{display:flex;gap:10px;font-size:0.72rem;color:var(--text-muted);margin-bottom:10px}
.popup-close{position:absolute;top:8px;left:8px;width:26px;height:26px;background:rgba(0,0,0,0.6);border:none;border-radius:50%;color:#fff;cursor:pointer;font-size:0.8rem;display:flex;align-items:center;justify-content:center}
.popup-btn{display:block;width:100%;background:var(--gold);color:var(--dark);border:none;border-radius:7px;padding:9px;font-family:'Frank Ruhl Libre',serif;font-weight:700;font-size:0.82rem;cursor:pointer;text-align:center;transition:background 0.2s}
.popup-btn:hover{background:var(--gold-light)}
.map-legend{position:absolute;bottom:20px;left:60px;display:flex;gap:14px;background:rgba(14,17,24,0.88);backdrop-filter:blur(8px);border:1px solid var(--dark-5);border-radius:8px;padding:7px 14px;z-index:10;font-size:0.7rem;color:var(--text-muted)}
.legend-item{display:flex;align-items:center;gap:5px}
.legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
@media(max-width:768px){.admin-body{grid-template-columns:1fr;grid-template-rows:45vh 1fr}.admin-sidebar{border-left:none;border-bottom:1px solid var(--dark-4)}.props-list{max-height:180px}.map-poi-bar{max-width:90%;top:8px;right:8px}.map-prop-popup{width:calc(100% - 32px);right:16px}}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo-wrap">
      <div class="login-logo-icon">🏢</div>
      <div class="login-company">גראביס יזמות ונדל"ן</div>
      <div class="login-subtitle">פורטל סוכנים</div>
    </div>
    <div class="login-divider"></div>
    <h1 class="login-title">כניסה לסוכנים</h1>

<div id="adminScreen">
  <nav class="admin-nav">

      </div>
    </div>
  </div>
</div>

<script>
// FIREBASE
function initFirebase() {
const firebaseConfig={apiKey:"AIzaSyCtCUpfNF4qnJksAWXGt4a9MHD5a-b9Xcc",authDomain:"gravis-nadlan.firebaseapp.com",projectId:"gravis-nadlan",storageBucket:"gravis-nadlan.firebasestorage.app",messagingSenderId:"548986709725",appId:"1:548986709725:web:fd27eb390aca59856c5d34"};
firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();

auth.onAuthStateChanged(user=>{
  if(user){showDashboard(user);}else{showLogin();}
});

function doLogin(){
  const email=document.getElementById('emailInput').value.trim();
  const pass=document.getElementById('passInput').value;
  const btn=document.getElementById('loginBtn');
  const err=document.getElementById('loginError');
  if(!email||!pass){showErr('נא למלא אימייל וסיסמה');return;}
  btn.classList.add('loading');btn.disabled=true;err.classList.remove('show');
  auth.signInWithEmailAndPassword(email,pass)
    .catch(e=>{
      btn.classList.remove('loading');btn.disabled=false;
      const m={'auth/wrong-password':'סיסמה שגויה','auth/user-not-found':'משתמש לא נמצא','auth/invalid-email':'אימייל לא תקין','auth/too-many-requests':'יותר מדי ניסיונות','auth/invalid-credential':'אימייל או סיסמה שגויים'};
      showErr(m[e.code]||'שגיאה: '+e.message);
    });
}
function doLogout(){auth.signOut();}
function showErr(m){const e=document.getElementById('loginError');e.textContent=m;e.classList.add('show');}
function showLogin(){document.getElementById('loginScreen').style.display='flex';document.getElementById('adminScreen').style.display='none';}
function showDashboard(user){document.getElementById('loginScreen').style.display='none';document.getElementById('adminScreen').style.display='block';document.getElementById('userEmail').textContent=user.email;initDashboard();}

} // end initFirebase

// DATA
const ALL_PROPS=[
  {id:1,title:'פנטהאוז יוקרה עם נוף לים',city:'תל אביב',street:'דיזנגוף',lat:32.0853,lng:34.7818,price:'₪4,850,000',rooms:5,sqm:148,floor:12,type:'penthouse',img:'https://images.unsplash.com/photo-1512917774080-9991f1c4c750?w=400&q=70'},

  {id:10,title:'דירה עם נוף לנמל',city:'אשדוד',street:'הנמל',lat:31.8044,lng:34.6553,price:'₪2,100,000',rooms:4,sqm:118,floor:6,type:'sale',img:'https://images.unsplash.com/photo-1513694203232-719a280e022f?w=400&q=70'},
  {id:11,title:'דירה מרווחת להשכרה',city:'ראשון לציון',street:'הרצל',lat:31.9730,lng:34.7925,price:'₪5,800/חו',rooms:3,sqm:80,floor:2,type:'rent',img:'https://images.unsplash.com/photo-1502672260266-1c1ef2d93688?w=400&q=70'},
  {id:12,title:'בית פרטי עם גינה',city:'כפר סבא',street:'ויצמן',lat:32.1780,lng:34.9070,price:'₪4,300,000',rooms:6,sqm:230,floor:0,type:'sale',img:'https://images.unsplash.com/photo-1564013799919-ab600027ffc6?w=400&q=70'},
];
const POI_DATA={
  shopping:[{name:'שוק הכרמל',lat:32.0805,lng:34.7785},{name:'מול דיזנגוף',lat:32.0830,lng:34.7760},{name:'סופרמרקט',lat:32.0875,lng:34.7800}],
  education:[{name:'ביה"ס ביאליק',lat:32.0838,lng:34.7845},{name:'גן ילדים',lat:32.0870,lng:34.7830}],
  transit:[{name:'תחנת דן',lat:32.0860,lng:34.7805},{name:'תחנת רכבת',lat:32.0750,lng:34.7900}],
  leisure:[{name:'גן מאיר',lat:32.0820,lng:34.7820},{name:'פארק הירקון',lat:32.1005,lng:34.7900}],
  beaches:[{name:'חוף גורדון',lat:32.0902,lng:34.7700},{name:'חוף הילטון',lat:32.0924,lng:34.7680},{name:'חוף פרישמן',lat:32.0880,lng:34.7690}],
};

// STATE
let activeFilter='all',searchQuery='',visibleProps=[...ALL_PROPS],selectedProp=null;
let activePOI=new Set(['shopping']),activePOITooltip=null;
let mapView={lat:32.0,lng:34.85,zoom:7},isDrag=false,dragStart=null,viewStart=null;
const tileCache={};
const canvas=document.getElementById('adminMapCanvas');
const ctx=canvas?canvas.getContext('2d'):null;

function initDashboard(){renderSidebar();setTimeout(initMap,200);}

// SIDEBAR
const TL={sale:'למכירה',rent:'להשכרה',penthouse:'פנטהאוז',new:'חדש'};
const TB={sale:'badge-sale',rent:'badge-rent',penthouse:'badge-penthouse',new:'badge-new'};
function renderSidebar(){
  const list=document.getElementById('propsList');if(!list)return;
  list.innerHTML=visibleProps.map(p=>`
    <div class="prop-item" id="pi-${p.id}" onclick="selectProp(${p.id})">
      <img class="prop-item-img" src="${p.img}" alt="" loading="lazy"/>
      <div class="prop-item-info">
        <div class="prop-item-title">${p.title}</div>
        <div class="prop-item-city">📍 ${p.city}</div>
        <div style="display:flex;align-items:center;gap:7px">
          <div class="prop-item-price">${p.price}</div>
          <span class="prop-type-badge ${TB[p.type]||'badge-sale'}">${TL[p.type]||p.type}</span>
        </div>
      </div>
    </div>`).join('');
  document.getElementById('propCount').textContent=visibleProps.length;
}
function setFilter(f,btn){activeFilter=f;document.querySelectorAll('.fpill').forEach(b=>b.classList.remove('active'));btn.classList.add('active');applyFilters();}
function filterBySearch(q){searchQuery=q.trim();applyFilters();}
function applyFilters(){
  visibleProps=ALL_PROPS.filter(p=>(activeFilter==='all'||p.type===activeFilter)&&(!searchQuery||p.title.includes(searchQuery)||p.city.includes(searchQuery)||p.street.includes(searchQuery)));
  renderSidebar();drawMap();
}
function selectProp(id){
  const p=ALL_PROPS.find(x=>x.id===id);if(!p)return;
  selectedProp=p;
  document.querySelectorAll('.prop-item').forEach(el=>el.classList.remove('active'));
  const el=document.getElementById('pi-'+id);if(el)el.classList.add('active');
  mapView={lat:p.lat,lng:p.lng,zoom:15};showPopup(p);drawMap();
}

// MAP ENGINE
function latLngToTile(lat,lng,z){return{x:Math.floor((lng+180)/360*Math.pow(2,z)),y:Math.floor((1-Math.log(Math.tan(lat*Math.PI/180)+1/Math.cos(lat*Math.PI/180))/Math.PI)/2*Math.pow(2,z))};}
function tileTopLeft(tx,ty,z){return{lng:tx/Math.pow(2,z)*360-180,lat:Math.atan(Math.sinh(Math.PI*(1-2*ty/Math.pow(2,z))))*180/Math.PI};}
function ll2xy(lat,lng){const z=Math.round(mapView.zoom),sc=Math.pow(2,z)*256,toM=la=>(0.5-Math.log(Math.tan(la*Math.PI/180)+1/Math.cos(la*Math.PI/180))/(2*Math.PI))*sc;return{x:canvas.width/2+((lng+180)/360*sc-(mapView.lng+180)/360*sc),y:canvas.height/2+(toM(lat)-toM(mapView.lat))};}
function loadTile(tx,ty,z){const k=`${z}/${tx}/${ty}`;if(tileCache[k]===false)return null;if(tileCache[k])return tileCache[k];const img=new Image();img.crossOrigin='anonymous';let i=0;const p=[`https://tile.openstreetmap.org/${z}/${tx}/${ty}.png`,`https://${'abc'[(tx+ty)%3]}.tile.openstreetmap.org/${z}/${tx}/${ty}.png`];function t(){if(i>=p.length){tileCache[k]=false;drawMap();return;}img.src=p[i++];}img.onload=()=>{tileCache[k]=img;drawMap();};img.onerror=t;t();tileCache[k]=null;return null;}

function drawMap(){
  if(!canvas||!ctx)return;
  const W=canvas.width,H=canvas.height;
  const bg=ctx.createLinearGradient(0,0,W,H);bg.addColorStop(0,'#070a10');bg.addColorStop(1,'#0b0f18');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(201,168,76,0.04)';
  for(let x=0;x<W;x+=28)for(let y=0;y<H;y+=28){ctx.beginPath();ctx.arc(x,y,1,0,Math.PI*2);ctx.fill();}
  const z=Math.round(mapView.zoom),ct=latLngToTile(mapView.lat,mapView.lng,z);
  let tl=0;
  for(let dx=-5;dx<=5;dx++)for(let dy=-5;dy<=5;dy++){
    const tx=ct.x+dx,ty=ct.y+dy;
    if(tx<0||ty<0||tx>=Math.pow(2,z)||ty>=Math.pow(2,z))continue;
    const tl2=tileTopLeft(tx,ty,z),br=tileTopLeft(tx+1,ty+1,z);
    const p0=ll2xy(tl2.lat,tl2.lng),p1=ll2xy(br.lat,br.lng);
    const img=loadTile(tx,ty,z);
    if(img){tl++;ctx.save();ctx.drawImage(img,p0.x,p0.y,p1.x-p0.x,p1.y-p0.y);ctx.globalCompositeOperation='multiply';ctx.fillStyle='#1a1f2e';ctx.fillRect(p0.x,p0.y,p1.x-p0.x,p1.y-p0.y);ctx.restore();}
  }
  if(tl===0){// fallback cities
    const cities=[{lat:32.085,lng:34.781,n:'ת"א',r:8},{lat:31.777,lng:35.234,n:'י-ם',r:7},{lat:32.794,lng:34.990,n:'חיפה',r:6},{lat:31.252,lng:34.791,n:'ב"ש',r:5},{lat:32.329,lng:34.858,n:'נתניה',r:5}];
    const roads=[[[32.085,34.781],[32.329,34.858]],[[32.085,34.781],[31.777,35.234]],[[32.085,34.781],[32.794,34.990]],[[31.804,34.655],[31.252,34.791]]];
    ctx.strokeStyle='rgba(201,168,76,0.1)';ctx.lineWidth=1.5;
    roads.forEach(([a,b])=>{const pa=ll2xy(a[0],a[1]),pb=ll2xy(b[0],b[1]);ctx.beginPath();ctx.moveTo(pa.x,pa.y);ctx.lineTo(pb.x,pb.y);ctx.stroke();});
    cities.forEach(c=>{const pos=ll2xy(c.lat,c.lng);ctx.beginPath();ctx.arc(pos.x,pos.y,c.r,0,Math.PI*2);ctx.fillStyle='rgba(201,168,76,0.15)';ctx.fill();ctx.strokeStyle='rgba(201,168,76,0.3)';ctx.lineWidth=1;ctx.stroke();ctx.font='bold 10px Heebo,sans-serif';ctx.textAlign='center';ctx.textBaseline='bottom';ctx.fillStyle='rgba(255,255,255,0.4)';ctx.fillText(c.n,pos.x,pos.y-c.r-2);});
  }
  // POI
  activePOI.forEach(poi=>(POI_DATA[poi]||[]).forEach(item=>{
    const pos=ll2xy(item.lat,item.lng);if(pos.x<-20||pos.x>W+20||pos.y<-20||pos.y>H+20)return;
    const isA=activePOITooltip&&activePOITooltip.name===item.name;
    ctx.beginPath();ctx.arc(pos.x,pos.y,isA?9:7,0,Math.PI*2);ctx.fillStyle=isA?'#ff6b6b':'#ef4444';ctx.fill();ctx.strokeStyle='rgba(255,255,255,0.9)';ctx.lineWidth=2;ctx.stroke();
    if(mapView.zoom>10||isA){ctx.font='bold 10px Heebo,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';const tw=ctx.measureText(item.name).width,lx=pos.x-tw/2-7,ly=pos.y-26;ctx.fillStyle='rgba(7,10,16,0.9)';ctx.beginPath();ctx.roundRect(lx,ly,tw+14,17,4);ctx.fill();ctx.strokeStyle='rgba(239,68,68,0.4)';ctx.lineWidth=1;ctx.stroke();ctx.fillStyle='#fff';ctx.fillText(item.name,pos.x,ly+8);}
  }));
  // Props
  visibleProps.forEach(p=>{
    const pos=ll2xy(p.lat,p.lng);if(pos.x<-20||pos.x>W+20||pos.y<-20||pos.y>H+20)return;
    const isSel=selectedProp&&selectedProp.id===p.id,r=isSel?15:11;
    const gr=ctx.createRadialGradient(pos.x,pos.y,0,pos.x,pos.y,isSel?30:20);gr.addColorStop(0,isSel?'rgba(201,168,76,0.5)':'rgba(201,168,76,0.25)');gr.addColorStop(1,'rgba(201,168,76,0)');
    ctx.beginPath();ctx.arc(pos.x,pos.y,isSel?30:20,0,Math.PI*2);ctx.fillStyle=gr;ctx.fill();
    ctx.beginPath();ctx.arc(pos.x,pos.y-r*0.3,r,0,Math.PI*2);ctx.fillStyle=isSel?'#e8d5a3':'#c9a84c';ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=isSel?3:2;ctx.stroke();
    ctx.beginPath();ctx.moveTo(pos.x-r*0.55,pos.y+r*0.55);ctx.lineTo(pos.x+r*0.55,pos.y+r*0.55);ctx.lineTo(pos.x,pos.y+r*1.85);ctx.closePath();ctx.fillStyle=isSel?'#e8d5a3':'#c9a84c';ctx.fill();
    ctx.font=(isSel?'13':'11')+'px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(p.type==='rent'?'🔑':p.type==='penthouse'?'👑':p.type==='new'?'✨':'🏠',pos.x,pos.y-r*0.3);
    if(mapView.zoom>8){const sh=p.price.replace('₪','').replace(',000,000','M').replace(',000','K');ctx.font='bold 9px Heebo,sans-serif';ctx.textAlign='center';ctx.textBaseline='top';const pw=ctx.measureText(sh).width;ctx.fillStyle='rgba(7,10,16,0.88)';ctx.beginPath();ctx.roundRect(pos.x-pw/2-5,pos.y+r*1.9,pw+10,14,3);ctx.fill();ctx.strokeStyle='rgba(201,168,76,0.4)';ctx.lineWidth=1;ctx.stroke();ctx.fillStyle='#c9a84c';ctx.fillText(sh,pos.x,pos.y+r*1.9+3);}
  });
  ctx.globalAlpha=0.2;ctx.font='9px sans-serif';ctx.fillStyle='#fff';ctx.textAlign='left';ctx.textBaseline='bottom';ctx.fillText('© OpenStreetMap',6,H-4);ctx.globalAlpha=1;
}

function initMap(){
  if(!canvas)return;
  const resize=()=>{canvas.width=canvas.parentElement.clientWidth;canvas.height=canvas.parentElement.clientHeight;drawMap();};
  window.addEventListener('resize',resize);resize();
  canvas.addEventListener('mousedown',e=>{isDrag=true;canvas.style.cursor='grabbing';dragStart={x:e.clientX,y:e.clientY};viewStart={lat:mapView.lat,lng:mapView.lng};});
  window.addEventListener('mousemove',e=>{if(!isDrag)return;const dx=e.clientX-dragStart.x,dy=e.clientY-dragStart.y,z=Math.round(mapView.zoom),sc=Math.pow(2,z)*256;mapView.lng=viewStart.lng-dx/sc*360;const s=Math.sin(viewStart.lat*Math.PI/180),mY=Math.log((1+s)/(1-s))/(4*Math.PI);mapView.lat=Math.atan(Math.sinh((mY+dy/sc)*2*Math.PI))*180/Math.PI;drawMap();});
  window.addEventListener('mouseup',()=>{isDrag=false;canvas.style.cursor='grab';});
  let lastTD=null;
  canvas.addEventListener('touchstart',e=>{if(e.touches.length===1){isDrag=true;dragStart={x:e.touches[0].clientX,y:e.touches[0].clientY};viewStart={lat:mapView.lat,lng:mapView.lng};}if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;lastTD=Math.hypot(dx,dy);}},{passive:true});
  canvas.addEventListener('touchmove',e=>{if(e.touches.length===1&&isDrag){const dx=e.touches[0].clientX-dragStart.x,dy=e.touches[0].clientY-dragStart.y,z=Math.round(mapView.zoom),sc=Math.pow(2,z)*256;mapView.lng=viewStart.lng-dx/sc*360;const s=Math.sin(viewStart.lat*Math.PI/180),mY=Math.log((1+s)/(1-s))/(4*Math.PI);mapView.lat=Math.atan(Math.sinh((mY+dy/sc)*2*Math.PI))*180/Math.PI;drawMap();}if(e.touches.length===2&&lastTD){e.preventDefault();const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY,d=Math.hypot(dx,dy);mapView.zoom=Math.max(5,Math.min(18,mapView.zoom+(d-lastTD)*0.01));lastTD=d;drawMap();}},{passive:false});
  canvas.addEventListener('touchend',()=>{isDrag=false;lastTD=null;});
  canvas.addEventListener('wheel',e=>{e.preventDefault();mapView.zoom=Math.max(5,Math.min(18,mapView.zoom-e.deltaY*0.004));drawMap();},{passive:false});
  canvas.addEventListener('click',e=>{
    const rect=canvas.getBoundingClientRect(),mx=e.clientX-rect.left,my=e.clientY-rect.top;
    for(const poi of activePOI)for(const item of(POI_DATA[poi]||[])){const pos=ll2xy(item.lat,item.lng);if(Math.hypot(mx-pos.x,my-pos.y)<12){activePOITooltip=activePOITooltip&&activePOITooltip.name===item.name?null:item;drawMap();return;}}
    for(const p of visibleProps){const pos=ll2xy(p.lat,p.lng);if(Math.hypot(mx-pos.x,my-pos.y)<16){selectProp(p.id);return;}}
    closePopup();activePOITooltip=null;drawMap();
  });
}

function zoomMap(d){mapView.zoom=Math.max(5,Math.min(18,mapView.zoom+d));drawMap();}
function resetView(){mapView={lat:32.0,lng:34.85,zoom:7};selectedProp=null;closePopup();drawMap();}
function togglePOI(poi,btn){btn.classList.toggle('active');if(activePOI.has(poi))activePOI.delete(poi);else activePOI.add(poi);drawMap();}

function showPopup(p){
  document.getElementById('popupImg').src=p.img;
  document.getElementById('popupType').textContent=TL[p.type]||p.type;
  document.getElementById('popupTitle').textContent=p.title;
  document.getElementById('popupLoc').textContent='📍 '+p.city+' · '+p.street;
  document.getElementById('popupPrice').textContent=p.price;
  document.getElementById('popupMeta').innerHTML=`<span>🛏 ${p.rooms} חד'</span><span>📐 ${p.sqm} מ"ר</span><span>🏙 קומה ${p.floor||'קרקע'}</span>`;
  document.getElementById('mapPopup').style.display='block';
}
function closePopup(){document.getElementById('mapPopup').style.display='none';selectedProp=null;drawMap();}
function shareWA(){
  if(!selectedProp)return;
  const msg=`היי! ראיתי נכס שיכול להתאים לך:\n\n🏠 ${selectedProp.title}\n📍 ${selectedProp.city}, ${selectedProp.street}\n💰 ${selectedProp.price}\n🛏 ${selectedProp.rooms} חדרים | 📐 ${selectedProp.sqm} מ"ר\n\nלפרטים: גראביס יזמות ונדל"ן\n📞 03-1234567`;
  window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank');
}
