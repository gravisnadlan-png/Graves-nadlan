<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>גראביס יזמות ונדל"ן</title>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@300;400;500;700;900&family=Heebo:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #e8d5a3;
    --dark: #0e0e0e;
    --dark-2: #161616;
    --dark-3: #1e1e1e;
    --dark-4: #2a2a2a;
    --text: #f0ece4;
    --text-muted: #888;
    --white: #ffffff;
    --radius: 4px;
    --cat-shopping: #f97316;
    --cat-leisure: #22c55e;
    --cat-education: #a78bfa;
    --cat-transit: #60a5fa;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Heebo', sans-serif;
    font-weight: 300;
    overflow-x: hidden;
  }

  h1,h2,h3,h4 { font-family: 'Frank Ruhl Libre', serif; font-weight: 700; }

  /* ── HERO ── */
  .hero {
    position: relative;
    height: 100vh;
    min-height: 680px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    overflow: hidden;
  }

  .hero-bg {
    position: absolute; inset: 0;
    background:
      linear-gradient(to bottom, rgba(14,14,14,0.3) 0%, rgba(14,14,14,0.85) 70%, var(--dark) 100%),
      url('https://images.unsplash.com/photo-1512917774080-9991f1c4c750?w=1800&q=80') center/cover no-repeat;
    animation: heroZoom 20s ease-in-out infinite alternate;
  }
  @keyframes heroZoom { from { transform: scale(1); } to { transform: scale(1.06); } }

  .nav {
    position: fixed; top: 0; right: 0; left: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px;
    height: 72px;
    background: rgba(10,14,26,0.97);
    border-bottom: 1px solid rgba(201,168,76,0.2);
    transition: background 0.4s;
  }
  .nav.scrolled { background: rgba(10,14,26,0.99); box-shadow: 0 4px 32px rgba(0,0,0,0.5); }

  .nav-hamburger {
    display: flex; flex-direction: column; gap: 5px;
    cursor: pointer; padding: 8px; background: none; border: none;
  }
  .nav-hamburger span {
    display: block; width: 26px; height: 2px;
    background: var(--gold); border-radius: 2px; transition: all 0.3s;
  }
  .nav-hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
  .nav-hamburger.open span:nth-child(2) { opacity: 0; }
  .nav-hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

  .nav-center {
    position: absolute; left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center;
  }
  .nav-company-name {
    font-family: 'Frank Ruhl Libre', serif;
    font-size: 1.05rem; font-weight: 700;
    color: var(--gold); letter-spacing: 2px; white-space: nowrap;
  }
  .nav-company-sub {
    font-size: 0.6rem; color: rgba(201,168,76,0.55);
    letter-spacing: 3px; text-transform: uppercase; margin-top: 2px;
  }
  .nav-logo-img {
    height: 52px; width: auto; object-fit: contain;
    filter: drop-shadow(0 0 8px rgba(201,168,76,0.35));
  }

  .mobile-menu {
    position: fixed; top: 72px; right: 0; left: 0; z-index: 99;
    background: rgba(10,14,26,0.98);
    border-bottom: 1px solid rgba(201,168,76,0.12);
    max-height: 0; overflow: hidden; transition: max-height 0.4s ease;
  }
  .mobile-menu.open { max-height: 400px; }
  .mobile-menu a {
    display: block; padding: 15px 32px;
    color: var(--text-muted); text-decoration: none; font-size: 1rem;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    transition: color 0.2s, padding-right 0.2s;
  }
  .mobile-menu a:hover { color: var(--gold); padding-right: 40px; }

  .nav-logo { display:none; }
  .nav-links { display: none; }



  .hero-content {
    position: relative; z-index: 1;
    padding: 0 48px 80px;
    max-width: 750px;
    animation: fadeUp 1s ease both;
  }
  @keyframes fadeUp { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:none; } }

  .hero-tag {
    display: inline-block;
    border: 1px solid var(--gold);
    color: var(--gold);
    font-size: 0.72rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 5px 14px;
    margin-bottom: 20px;
  }

  .hero h1 {
    font-size: clamp(2.6rem, 5vw, 4.2rem);
    line-height: 1.1;
    margin-bottom: 18px;
    color: var(--white);
  }
  .hero h1 em { color: var(--gold); font-style: normal; }

  .hero-sub {
    font-size: 1rem;
    color: var(--text-muted);
    margin-bottom: 36px;
    max-width: 480px;
    line-height: 1.7;
  }

  .hero-price {
    font-family: 'Frank Ruhl Libre', serif;
    font-size: 2rem;
    color: var(--gold);
    margin-bottom: 28px;
  }
  .hero-price small { font-family: 'Heebo', sans-serif; font-size: 0.85rem; color: var(--text-muted); margin-right: 10px; }

  .btn-primary {
    display: inline-flex; align-items: center; gap: 10px;
    background: var(--gold);
    color: var(--dark);
    font-family: 'Frank Ruhl Libre', serif;
    font-weight: 700;
    font-size: 0.95rem;
    padding: 14px 32px;
    border: none; cursor: pointer;
    text-decoration: none;
    transition: background 0.2s, transform 0.2s;
  }
  .btn-primary:hover { background: var(--gold-light); transform: translateY(-2px); }

  .btn-outline {
    display: inline-flex; align-items: center; gap: 10px;
    background: transparent;
    color: var(--text);
    font-size: 0.9rem;
    padding: 14px 28px;
    border: 1px solid var(--dark-4);
    cursor: pointer;
    text-decoration: none;
    transition: border-color 0.2s, color 0.2s;
    margin-right: 12px;
  }
  .btn-outline:hover { border-color: var(--gold); color: var(--gold); }

  /* ── STATS BAR ── */
  .stats-bar {
    display: flex;
    background: var(--dark-3);
    border-top: 1px solid var(--dark-4);
    border-bottom: 1px solid var(--dark-4);
  }
  .stat-item {
    flex: 1;
    display: flex; flex-direction: column; align-items: center;
    padding: 28px 20px;
    border-left: 1px solid var(--dark-4);
    animation: fadeUp 0.8s ease both;
  }
  .stat-item:last-child { border-left: none; }
  .stat-icon { font-size: 1.4rem; margin-bottom: 8px; }
  .stat-value {
    font-family: 'Frank Ruhl Libre', serif;
    font-size: 1.6rem;
    color: var(--gold);
  }
  .stat-label { font-size: 0.78rem; color: var(--text-muted); margin-top: 3px; }

  /* ── SECTION COMMON ── */
  .section { padding: 90px 48px; }
  .section-tag {
    font-size: 0.72rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 12px;
  }
  .section-title {
    font-size: clamp(1.8rem, 3vw, 2.6rem);
    margin-bottom: 18px;
    color: var(--white);
  }
  .section-sub {
    color: var(--text-muted);
    line-height: 1.8;
    max-width: 520px;
    font-size: 0.95rem;
  }

  /* ── GALLERY ── */
  .gallery-grid {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr;
    grid-template-rows: 260px 200px;
    gap: 6px;
    margin-top: 40px;
    border-radius: var(--radius);
    overflow: hidden;
  }
  .gallery-item {
    overflow: hidden;
    position: relative;
    cursor: pointer;
  }
  .gallery-item:first-child { grid-row: 1 / 3; }
  .gallery-item img {
    width: 100%; height: 100%;
    object-fit: cover;
    transition: transform 0.5s ease;
    filter: brightness(0.9);
  }
  .gallery-item:hover img { transform: scale(1.06); filter: brightness(1); }
  .gallery-item::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.4) 0%, transparent 50%);
    pointer-events: none;
  }

  /* ── FEATURES ── */
  .features-section { background: var(--dark-2); }
  .features-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 2px;
    margin-top: 50px;
    background: var(--dark-4);
  }
  .feature-card {
    background: var(--dark-2);
    padding: 36px 28px;
    transition: background 0.3s;
    animation: fadeUp 0.8s ease both;
  }
  .feature-card:hover { background: var(--dark-3); }
  .feature-icon {
    font-size: 1.8rem;
    margin-bottom: 14px;
    display: block;
  }
  .feature-title {
    font-family: 'Frank Ruhl Libre', serif;
    font-size: 1.05rem;
    color: var(--white);
    margin-bottom: 8px;
  }
  .feature-desc { font-size: 0.83rem; color: var(--text-muted); line-height: 1.7; }

  /* ── MAP SECTION ── */
  .map-section { background: var(--dark); padding: 90px 0 0; }
  .map-header { padding: 0 48px 40px; }

  .category-filters {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 30px;
  }
  .cat-btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 20px;
    border: 1px solid var(--dark-4);
    background: var(--dark-3);
    color: var(--text-muted);
    font-family: 'Heebo', sans-serif;
    font-size: 0.85rem;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
  }
  .cat-btn::before {
    content: '';
    position: absolute; right: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--cat-color, var(--gold));
    opacity: 0;
    transition: opacity 0.25s;
  }
  .cat-btn.active {
    background: var(--dark-4);
    color: var(--white);
    border-color: var(--cat-color, var(--gold));
  }
  .cat-btn.active::before { opacity: 1; }
  .cat-btn .cat-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    background: var(--cat-color, var(--gold));
  }
  .cat-btn .spinner {
    width: 12px; height: 12px;
    border: 2px solid var(--dark-4);
    border-top-color: var(--cat-color, var(--gold));
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .map-wrapper {
    position: relative;
    height: 560px;
    background: var(--dark-3);
    border-top: 1px solid var(--dark-4);
    margin-top: 20px;
  }

  #map { width: 100%; height: 100%; }

  /* Info panel */
  .place-panel {
    position: absolute;
    bottom: 24px; right: 24px;
    width: 290px;
    background: var(--dark-2);
    border: 1px solid var(--dark-4);
    border-right: 3px solid var(--gold);
    padding: 20px 22px;
    z-index: 10;
    animation: slideIn 0.3s ease;
    box-shadow: 0 16px 48px rgba(0,0,0,0.5);
  }
  @keyframes slideIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:none; } }
  .place-panel-close {
    position: absolute; top: 12px; left: 14px;
    background: none; border: none;
    color: var(--text-muted); cursor: pointer;
    font-size: 1.1rem; line-height: 1;
  }
  .place-panel-close:hover { color: var(--white); }
  .place-panel-cat {
    font-size: 0.7rem; letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .place-panel-name {
    font-family: 'Frank Ruhl Libre', serif;
    font-size: 1.15rem;
    color: var(--white);
    margin-bottom: 12px;
  }
  .place-panel-dist {
    display: inline-flex; align-items: center; gap: 7px;
    background: var(--dark-4);
    padding: 7px 14px;
    font-size: 0.83rem;
    color: var(--gold);
  }
  .place-panel-rating {
    margin-top: 10px;
    font-size: 0.8rem;
    color: var(--text-muted);
  }

  /* Map overlay when no API key */
  .map-demo-overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: var(--dark-3);
    text-align: center; gap: 16px;
    z-index: 20;
  }
  .map-demo-overlay h3 {
    font-size: 1.3rem;
    color: var(--gold);
  }
  .map-demo-overlay p {
    font-size: 0.88rem;
    color: var(--text-muted);
    max-width: 380px;
    line-height: 1.7;
  }
  .code-inline {
    background: var(--dark-4);
    color: var(--gold-light);
    padding: 3px 10px;
    font-family: monospace;
    font-size: 0.82rem;
    border-radius: 2px;
  }

  /* ── CONTACT ── */
  .contact-section {
    background: var(--dark-2);
    padding: 90px 48px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: center;
  }
  .contact-form { display: flex; flex-direction: column; gap: 14px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-field {
    display: flex; flex-direction: column; gap: 6px;
  }
  .form-field label { font-size: 0.75rem; color: var(--text-muted); letter-spacing: 0.5px; }
  .form-field input, .form-field textarea, .form-field select {
    background: var(--dark-3);
    border: 1px solid var(--dark-4);
    color: var(--text);
    font-family: 'Heebo', sans-serif;
    font-size: 0.9rem;
    padding: 12px 16px;
    border-radius: var(--radius);
    transition: border-color 0.2s;
    outline: none;
  }
  .form-field input:focus, .form-field textarea:focus, .form-field select:focus {
    border-color: var(--gold);
  }
  .form-field textarea { resize: vertical; min-height: 100px; }
  .form-field select { appearance: none; cursor: pointer; }

  .contact-info { display: flex; flex-direction: column; gap: 28px; }
  .contact-item {
    display: flex; align-items: flex-start; gap: 16px;
    padding-bottom: 28px;
    border-bottom: 1px solid var(--dark-4);
  }
  .contact-item:last-child { border-bottom: none; padding-bottom: 0; }
  .contact-icon {
    width: 44px; height: 44px;
    background: var(--dark-4);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem;
    flex-shrink: 0;
  }
  .contact-item-title { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 4px; }
  .contact-item-value { font-size: 0.95rem; color: var(--white); }

  /* ── FOOTER ── */
  footer {
    background: var(--dark);
    border-top: 1px solid var(--dark-4);
    padding: 36px 48px;
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 16px;
  }
  .footer-logo { font-family: 'Frank Ruhl Libre', serif; font-size: 1.2rem; color: var(--gold); }
  .footer-copy { font-size: 0.78rem; color: var(--text-muted); }

  /* ── MAP & SEARCH ── */
  .map-section { background: var(--dark); padding: 90px 0 0; }
  .map-header { padding: 0 48px 30px; }

  .search-bar-wrap { display: flex; margin-top: 28px; position: relative; }
  .search-input {
    flex: 1; background: var(--dark-3);
    border: 1px solid var(--dark-4); border-left: none;
    color: var(--text); font-family: 'Heebo', sans-serif;
    font-size: 1rem; padding: 14px 20px; outline: none;
    direction: rtl; transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--gold); }
  .search-input::placeholder { color: var(--text-muted); }
  .search-btn {
    background: var(--gold); border: none; cursor: pointer;
    padding: 0 24px; color: var(--dark); font-size: 1.2rem;
    transition: background 0.2s; flex-shrink: 0;
  }
  .search-btn:hover { background: var(--gold-light); }

  .autocomplete-list {
    position: absolute; top: 100%; right: 0; left: 0;
    background: var(--dark-2); border: 1px solid var(--dark-4);
    border-top: none; z-index: 50;
    max-height: 220px; overflow-y: auto; display: none;
  }
  .autocomplete-list.open { display: block; }
  .autocomplete-item {
    padding: 12px 20px; cursor: pointer; font-size: 0.9rem;
    color: var(--text); border-bottom: 1px solid rgba(255,255,255,0.04);
    display: flex; align-items: center; gap: 10px;
    transition: background 0.15s;
  }
  .autocomplete-item:hover { background: var(--dark-3); color: var(--gold); }
  .autocomplete-icon { color: var(--gold); }

  .map-filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; }
  .map-pill {
    padding: 7px 16px; background: var(--dark-3);
    border: 1px solid var(--dark-4); color: var(--text-muted);
    font-size: 0.8rem; cursor: pointer; border-radius: 2px;
    transition: all 0.2s; white-space: nowrap;
  }
  .map-pill.active { background: var(--dark-4); border-color: var(--gold); color: var(--gold); }

  .map-wrapper {
    position: relative; height: 580px;
    background: var(--dark-3);
    border-top: 1px solid var(--dark-4); margin-top: 24px;
  }
  #mapCanvas { width: 100%; height: 100%; display: block; cursor: grab; }

  .map-badge {
    position: absolute; top: 14px; right: 14px;
    background: var(--dark-2); border: 1px solid var(--gold);
    color: var(--gold); font-size: 0.78rem;
    padding: 6px 14px; z-index: 10;
    font-family: 'Frank Ruhl Libre', serif;
  }
  .map-zoom-btns {
    position: absolute; bottom: 80px; left: 14px;
    display: flex; flex-direction: column; gap: 2px; z-index: 10;
  }
  .map-zoom-btns button {
    width: 34px; height: 34px;
    background: var(--dark-2); border: 1px solid var(--dark-4);
    color: var(--text); font-size: 1.1rem; cursor: pointer;
    transition: color 0.2s, background 0.2s;
  }
  .map-zoom-btns button:hover { background: var(--dark-4); color: var(--gold); }

  .prop-card {
    position: absolute; bottom: 24px; right: 24px; width: 300px;
    background: var(--dark-2); border: 1px solid var(--dark-4);
    border-right: 3px solid var(--gold); z-index: 10;
    box-shadow: 0 16px 48px rgba(0,0,0,0.6);
    animation: slideIn 0.3s ease; display: none;
  }
  @keyframes slideIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }
  .prop-card-img { width:100%; height:150px; object-fit:cover; display:block; filter:brightness(0.88); }
  .prop-card-body { padding: 14px 16px; }
  .prop-card-title { font-family:'Frank Ruhl Libre',serif; font-size:1rem; color:var(--white); margin-bottom:4px; }
  .prop-card-price { color:var(--gold); font-size:0.95rem; margin-bottom:8px; }
  .prop-card-meta { display:flex; gap:12px; font-size:0.76rem; color:var(--text-muted); }
  .prop-card-close {
    position:absolute; top:8px; left:10px;
    background:rgba(0,0,0,0.55); border:none; color:#fff;
    width:26px; height:26px; border-radius:50%; cursor:pointer;
    font-size:0.85rem; display:flex; align-items:center; justify-content:center;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 900px) {
    .hero-content { padding: 0 24px 60px; }
    .section { padding: 60px 24px; }
    .stats-bar { flex-wrap: wrap; }
    .stat-item { min-width: 50%; }
    .gallery-grid { grid-template-columns: 1fr 1fr; grid-template-rows: auto; }
    .gallery-item:first-child { grid-row: auto; grid-column: 1 / -1; height: 240px; }
    .contact-section { grid-template-columns: 1fr; gap: 40px; padding: 60px 24px; }
    .form-row { grid-template-columns: 1fr; }
    footer { padding: 28px 24px; }
    .map-header { padding: 0 24px 24px; }
    .prop-card { width: calc(100% - 32px); right: 16px; }
    .nav-company-name { font-size: 0.82rem; letter-spacing: 1px; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav" id="mainNav">
  <!-- Hamburger right -->
  <button class="nav-hamburger" id="hamburger" onclick="toggleMenu()" aria-label="תפריט">
    <span></span><span></span><span></span>
  </button>

  <!-- Center: company name -->
  <div class="nav-center">
    <div class="nav-company-name">גראביס יזמות ונדל"ן</div>
    <div class="nav-company-sub">נדל״ן פרימיום</div>
